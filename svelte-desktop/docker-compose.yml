version: '3.8'

services:
  app:
    build: .
    image: svelte-desktop:latest
    container_name: svelte-desktop-app
    shm_size: '2gb'
    environment:
      - DISPLAY=host.docker.internal:0.0
      - GDK_BACKEND=x11
      - XDG_RUNTIME_DIR=/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ./svelte-desktop
    #   - DISPLAY=$DISPLAY
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix
    # network_mode: host
